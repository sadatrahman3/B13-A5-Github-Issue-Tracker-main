<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="loading-screen" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Loading Issues...</p>
    </div>

    <div id="login-page" class="auth-container">
    <div class="auth-card">
        <div class="brand">
            <i class="fab fa-github brand-icon"></i>
            <h2>GitHub Issues Tracker</h2>
            <p class="subtitle">Sign in to manage your issues</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter Username" required>
                <small class="helper-text">Default: admin</small>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password" required>
                <small class="helper-text">Default: admin123</small>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="demo-box">
            <p>Demo Credentials:</p>
            <div class="credentials">
                <strong>Username:</strong> admin<br>
                <strong>Password:</strong> admin123
            </div>
        </div>
    </div>
</div>

    <div id="dashboard-page" class="dashboard-container hidden">
        <nav class="navbar">
            <div class="nav-left">
                <i class="fab fa-github"></i>
                <span>GitHub Issues Tracker</span>
            </div>
            <div class="nav-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search issues...">
                </div>
                <button class="btn-new">+ New Issue</button>
            </div>
        </nav>

        <main class="content">
            <div class="filter-tabs">
                <button class="tab active" data-filter="all">All</button>
                <button class="tab" data-filter="open">Open</button>
                <button class="tab" data-filter="closed">Closed</button>
            </div>

            <div class="stats-bar">
                <div class="stats-left">
                    <div class="icon-bg"><i class="fas fa-bullseye"></i></div>
                    <div>
                        <h2 id="issue-count">0 Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="status-legend">
                    <span><span class="dot open"></span> Open</span>
                    <span><span class="dot closed"></span> Closed</span>
                </div>
            </div>

            <div id="issues-grid" class="issues-grid"></div>
        </main>
    </div>

    <div id="issue-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <div class="modal-subheader">
                <span id="modal-status-pill" class="status-pill"></span>
                <span class="author-info">Opened by <span id="modal-author"></span> • <span id="modal-date"></span></span>
            </div>

            <div id="modal-labels" class="modal-labels-container"></div>

            <p id="modal-description" class="modal-body-text"></p>

            <div class="modal-meta-grid">
                <div class="meta-item">
                    <span class="meta-label">Assignee:</span>
                    <span id="modal-assignee" class="meta-value"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Priority:</span>
                    <span id="modal-priority-pill" class="priority-pill"></span>
                </div>
            </div>

            <div class="modal-actions">
                <button id="close-modal" class="btn-modal-close">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
